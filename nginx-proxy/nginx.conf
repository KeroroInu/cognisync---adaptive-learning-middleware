server {
    listen 8002;

    # ── 后端 API (/api/...) ────────────────────────────────────
    # 转发到 backend 容器（Docker 内部网络名）
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # 同时透传后端的 /docs /redoc /openapi.json /health
    location ~ ^/(docs|redoc|openapi\.json|health)(/.*)?$ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    # ── 管理员前端 (/admin/...) ────────────────────────────────
    # Vite base='/admin/' 已将所有资源路径设为 /admin/assets/...
    # 这里直接透传路径（不去除前缀），admin-frontend 容器 nginx
    # 通过 /admin/ location + alias 处理
    location /admin {
        proxy_pass         http://admin-frontend:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── 用户前端 (/) ───────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
