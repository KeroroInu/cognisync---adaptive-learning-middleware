version: '3.8'

services:
  # ── 后端 API ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cognisync-backend
    restart: unless-stopped
    ports:
      - "18090:8000"
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_HOST=postgres
      - NEO4J_URI=bolt://neo4j:7687
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - cognisync-network

  # ── 用户前端 ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cognisync-frontend
    restart: unless-stopped
    ports:
      - "18080:80"
    depends_on:
      - backend
    networks:
      - cognisync-network

  # ── 管理后台 ───────────────────────────────────────────────
  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
    container_name: cognisync-admin
    restart: unless-stopped
    ports:
      - "18081:80"
    depends_on:
      - backend
    networks:
      - cognisync-network

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: cognisync-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-cognisync}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-cognisync_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - cognisync-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cognisync}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cognisync-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - cognisync-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Neo4j ──────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.15-community
    container_name: cognisync-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-changeme}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - cognisync-network

volumes:
  postgres-data:
  redis-data:
  neo4j-data:
  neo4j-logs:

networks:
  cognisync-network:
    driver: bridge
